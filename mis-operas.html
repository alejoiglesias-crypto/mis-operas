<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Óperas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blanco: #ffffff;
    --crema: #f8f6f2;
    --gris-claro: #efefed;
    --gris: #888;
    --gris-oscuro: #444;
    --negro: #111;
    --acento: #1a1a1a;
    --linea: #e0ddd8;
    --dorado: #9a7d4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--blanco); color: var(--negro); font-family: 'EB Garamond', serif; min-height: 100vh; font-size: 16px; }

  /* HEADER */
  header {
    background: var(--blanco);
    border-bottom: 1px solid var(--negro);
    padding: 0 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--negro);
  }
  .logo em { font-style: italic; font-weight: 400; }
  .header-actions { display: flex; gap: 1rem; align-items: center; }
  .sync-status { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--gris); text-transform: uppercase; }
  .sync-status.ok { color: #5a8a5a; }
  .sync-status.err { color: #a05050; }
  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.45rem 1.1rem;
    border: 1px solid var(--negro);
    background: transparent;
    color: var(--negro);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--negro); color: var(--blanco); }
  .btn-primary { background: var(--negro); color: var(--blanco); }
  .btn-primary:hover { background: var(--gris-oscuro); }

  /* LAYOUT */
  .container { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 64px); }

  /* SIDEBAR */
  .sidebar { border-right: 1px solid var(--linea); background: var(--crema); overflow-y: auto; }
  .sidebar-header { padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--linea); }
  .sidebar-label { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gris); }
  .sidebar-count { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--negro); margin-top: 0.2rem; }

  .opera-card { padding: 1.1rem 1.5rem; cursor: pointer; border-bottom: 1px solid var(--linea); transition: background 0.15s; position: relative; }
  .opera-card:hover { background: var(--gris-claro); }
  .opera-card.active { background: var(--blanco); }
  .opera-card.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--negro); }
  .opera-card-num { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.25em; color: var(--dorado); margin-bottom: 0.3rem; text-transform: uppercase; }
  .opera-card-title { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-style: italic; color: var(--negro); margin-bottom: 0.15rem; line-height: 1.3; }
  .opera-card-sub { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; color: var(--gris); letter-spacing: 0.05em; }
  .opera-card-rating { color: var(--dorado); font-size: 0.7rem; margin-top: 0.4rem; letter-spacing: 0.1em; }

  .add-btn { width: 100%; padding: 1.1rem 1.5rem; background: transparent; border: none; border-top: 1px solid var(--linea); color: var(--gris); font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; text-align: left; transition: color 0.2s; }
  .add-btn:hover { color: var(--negro); }

  /* DETAIL */
  .detail { padding: 3rem 4rem; overflow-y: auto; max-height: calc(100vh - 64px); background: var(--blanco); }

  .detail-header { padding-bottom: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--linea); }
  .ficha-num { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 0.3em; color: var(--dorado); text-transform: uppercase; margin-bottom: 0.6rem; }
  .opera-title-big { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-style: italic; font-weight: 400; line-height: 1.1; color: var(--negro); margin-bottom: 0.4rem; }
  .opera-subtitle { font-family: 'EB Garamond', serif; font-size: 1rem; color: var(--gris); font-style: italic; margin-bottom: 1.5rem; }
  .header-meta { display: flex; justify-content: space-between; align-items: flex-end; }
  .rating-display { text-align: right; }
  .stars-input { display: flex; gap: 0.15rem; justify-content: flex-end; margin-bottom: 0.2rem; }
  .star { font-size: 1rem; cursor: pointer; color: var(--linea); transition: color 0.15s; }
  .star.filled { color: var(--dorado); }
  .star:hover { color: var(--dorado); }
  .rating-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.2em; color: var(--gris); text-transform: uppercase; }

  /* SECTIONS */
  .section { margin-bottom: 2.5rem; }
  .section-title { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gris); margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--linea); }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--linea); border: 1px solid var(--linea); }
  .fields-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
  .fields-grid.single { grid-template-columns: 1fr; }
  .field { background: var(--blanco); padding: 0.9rem 1rem; }
  .field-full { grid-column: 1/-1; }
  .field-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gris); margin-bottom: 0.3rem; }
  .field-value { font-family: 'EB Garamond', serif; font-size: 0.95rem; color: var(--negro); background: transparent; border: none; width: 100%; outline: none; resize: none; line-height: 1.5; }
  .field-value::placeholder { color: #ccc; font-style: italic; }
  .field:focus-within { background: #fdfcfa; }

  /* REPARTO */
  .reparto-table { width: 100%; border-collapse: collapse; }
  .reparto-table th { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gris); text-align: left; padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--negro); }
  .reparto-table td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--linea); font-size: 0.95rem; }
  .reparto-table tr:last-child td { border-bottom: none; }
  .personaje { color: var(--gris); font-style: italic; }
  .voz { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--dorado); text-transform: uppercase; }
  .cantante { font-weight: 500; }

  /* LINKS */
  .links-list { display: flex; flex-direction: column; }
  .link-item { display: flex; align-items: center; gap: 1rem; padding: 0.7rem 0; border-bottom: 1px solid var(--linea); text-decoration: none; transition: opacity 0.15s; }
  .link-item:hover { opacity: 0.6; }
  .link-medio { font-family: 'EB Garamond', serif; font-size: 0.95rem; color: var(--negro); flex: 1; }
  .link-lang { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.15em; color: var(--gris); text-transform: uppercase; }
  .link-arrow { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--gris); }

  /* TICKET */
  .ticket-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--linea); border: 1px solid var(--linea); }
  .ticket-item { background: var(--crema); padding: 0.9rem 1rem; }
  .ticket-label { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gris); margin-bottom: 0.3rem; }
  .ticket-value { font-family: 'EB Garamond', serif; font-size: 0.95rem; color: var(--negro); }
  .ticket-value.price { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dorado); }

  /* VINCULOS */
  .vinculo-tag { display: inline-block; padding: 0.2rem 0.7rem; border: 1px solid var(--linea); font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--gris); margin: 0.2rem; }

  /* EMPTY */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--gris); text-align: center; }
  .empty-text { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; color: var(--gris); }

  /* SAVE BAR */
  .save-bar { position: fixed; bottom: 2rem; right: 2rem; background: var(--negro); color: var(--blanco); padding: 0.7rem 1.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; opacity: 0; transition: opacity 0.3s; z-index: 200; border: none; }
  .save-bar.visible { opacity: 1; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--crema); }
  ::-webkit-scrollbar-thumb { background: var(--linea); }

  @media(max-width:800px){
    .container{grid-template-columns:1fr;}
    .detail{padding:1.5rem;}
    .fields-grid,.fields-grid.triple{grid-template-columns:1fr;}
    .ticket-grid{grid-template-columns:1fr 1fr;}
    .opera-title-big{font-size:2rem;}
    header{padding:0 1.5rem;}
  }
</style>
</head>
<body>
<header>

  <div class="header-actions">
    <span class="sync-status" id="sync-status">Conectando</span>

<div class="container">

</div>
<button class="save-bar" id="save-bar" onclick="guardar()">Guardar en la nube</button>

let operas = [], operaActual = null, cambiosPendientes = false;

const INICIALES = [
  {id:1,num:"001",titulo:"Lucia di Lammermoor",compositor:"Gaetano Donizetti",libretista:"Salvatore Cammarano",fuente:"The Bride of Lammermoor, Walter Scott (1819)",idioma:"Italiano",estreno_mundial:"Teatro San Carlo, Nápoles — 26 septiembre 1835",estreno_teatro:"31 mayo 1851",fecha:"22 de junio de 2018",hora:"20:00",teatro:"Teatro Real",sala:"Sala Principal",ciudad:"Madrid, España",temporada:"2017–2018",tipo_funcion:"Première — función inaugural",contexto:"Cierre de temporada del Bicentenario y 20º aniversario del Teatro Real. La obra no se veía en Madrid desde 2001, con Edita Gruberova.",dir_musical:"Daniel Oren",dir_escena:"David Alden",escenografo:"Charles Edwards",figurinista:"Brigitte Reiffenstuel",iluminacion:"Adam Silverman",dir_coro:"Andrés Máspero",orquesta:"Orquesta Titular del Teatro Real",coro:"Coro Titular del Teatro Real",reparto:[{personaje:"Lucia",voz:"Soprano",cantante:"Lisette Oropesa"},{personaje:"Edgardo",voz:"Tenor",cantante:"Javier Camarena"},{personaje:"Enrico Ashton",voz:"Barítono",cantante:"Artur Ruciński"},{personaje:"Raimondo Bidebent",voz:"Bajo",cantante:"Roberto Tagliavini"},{personaje:"Lord Arturo Bucklaw",voz:"Tenor",cantante:"Yijie Shi"},{personaje:"Alisa",voz:"Mezzosoprano",cantante:"Marina Pinchuk"},{personaje:"Normanno",voz:"Barítono",cantante:"Alejandro del Cerro"}],produccion_origen:"English National Opera (ENO), Londres — 2008/2010",tipo_produccion:"Producción cedida",ambientacion:"Escocia victoriana, siglo XIX",propuesta_escenica:"Atmósfera gótica inspirada en Edgar Allan Poe. Casa victoriana en ruinas, vestuario en blanco y negro, mundo opresivo.",elemento_singular:"Première de la temporada del Bicentenario",criticas:[{medio:"Bachtrack",idioma:"ES/EN",url:"https://bachtrack.com/es_ES/review-lucia-lammermoor-alden-oren-camarena-oropesa-teatro-real-madrid-june-2018"},{medio:"Seen and Heard International",idioma:"EN",url:"https://seenandheard-international.com/2018/06/lucia-di-lammermoor-makes-a-triumphant-return-to-the-teatro-r   {id:2,num:"002",titulo:"Carmen",compositor:"Georges Bizet",libretista:"Henri Meilhac y Ludovic Halévy",fuente:"Novela Carmen (1845) de Prosper Mérimée",idioma:"Francés",estreno_mundial:"Opéra-Comique, París — 3 marzo 1875",estreno_teatro:"14 marzo 1888",fecha:"23 de diciembre de 2025",hora:"19:30",teatro:"Teatro Real",sala:"Sala Principal",ciudad:"Madrid, España",temporada:"2025–2026",tipo_funcion:"Nueva producción",contexto:"150 aniversario del estreno. Primera mujer en dirigir una ópera en el Teatro Real (Eun Sun Kim).",dir_musical:"Eun Sun Kim",dir_escena:"Damiano Michieletto",escenografo:"Paolo Fantin",figurinista:"Carla Teti",iluminacion:"Alessandro Carletti",dir_coro:"José Luis Basso",orquesta:"Orquesta Titular del Teatro Real",coro:"Coro Titular del Teatro Real / Coro Intermezzo – OSM / Pequeños Cantores de la ORCAM",reparto:[{personaje:"Carmen",voz:"Mezzosoprano",cantante:"Aigul Akhmetshina"},{personaje:"Don José",voz:"Tenor",cantante:"Charles Castronovo"},{personaje:"Escamillo",voz:"Barítono",cantante:"Lucas Meachem"},{personaje:"Micaëla",voz:"Soprano",cantante:"Adriana González"},{personaje:"Zúñiga",voz:"Bajo",cantante:"David Lagares"},{personaje:"Moralès",voz:"Barítono",cantante:"Toni Marsol"},{personaje:"Frasquita",voz:"Soprano",cantante:"Natalia Labourdette"},{personaje:"Mercédès",voz:"Mezzosoprano",cantante:"Marie-Claude Chappuis"},{personaje:"Le Dancaïre",voz:"Barítono",cantante:"Lluís Calvet"},{personaje:"Le Remendado",voz:"Tenor",cantante:"Mikeldi Atxalandabaso"}],produccion_origen:"Royal Opera House, Londres — 2024",tipo_produccion:"Nueva producción — coproducción Teatro Real / ROH / La Scala",ambientacion:"España, años 70 del siglo XX",propuesta_escenica:"Enfoque naturalista y psicológico. Escenario circular giratorio. Introduce a la madre de Don José en escena. Final: Don José estrangula a Carmen.",elemento_singular:"Primera mujer dirigiendo ópera en el Teatro Real",criticas:[{medio:"Bachtrack",idioma:"ES",url:"https://bachtrack.com/critica-madrid-teatro-real-kim-orquesta-titular-teatro-real-akhmetshina-gonzalez-castronovo-diciembre-2025"},{medio:"Opera World",idioma:"ES",url:"https://www.operaworld.es/critica-carmen-con-aigul-akhmetshina-en-el-teatro-real-de-madrid/"},{medio:"OperaWire",idioma:"EN",url:"https://operawire.com/teatro-real-de-madrid-2025-26-review-carmen/"},{medio:"Codalario",idioma:"ES",url:"https://www.codalario.com/carmen/criticas/critica-carmen-en-el-teatro-real_14487_5_46542_0_1_in.html"},{medio:"El Diario",idioma:"ES",url:"https://www.eldiario.es/cultura/teatro/carmen-llega-teatro-real-version-desvaida-cani_129_12838083.html"},{medio:"Shangay",idioma:"ES",url:"https://shangay.com/2025/12/11/carmen-viaja-de-la-mano-de-una-soberbia-aigul-akhmetshina-del-teatro-real-a-las-periferias-esteticas-y-eticas/"},{medio:"Beckmesser",idioma:"ES",url:"https://www.beckmesser.com/critica-segundo-reparto-carmen-teatro-real/"}],url_teatro:"https://www.teatroreal.es/en/show/carmen-1",url_programa:"https://www.teatroreal.es/sites/default/files/2025-12/M_PROGRAMA_CARMEN.pdf",ticket_localidad:"Patio de Butacas — Bloque Butaca Premium",ticket_fila:"Fila 11",ticket_asientos:"Asientos 5 y 7",ticket_precio_unit:"289,00 EUR",ticket_total:"582,00 EUR",ticket_fuente:"Ticketshop General — Tarjeta internet",ticket_tipo:"E-ticket (digital)",valoracion:0,notas:"",momentos:"",volveria:"",diario:"",contexto_historico:"Carmen es la última ópera de Bizet. Estrenada en 1875 en París, fue inicialmente mal recibida. Bizet murió tres meses después sin saber que se convertiría en símbolo universal.",vinculos:["Mismo teatro que Lucia di Lammermoor 2018 (Ficha 001)","Damiano Michieletto previamente en el Teatro Real: L'elisir d'amore (2013/2019)"]}
];

function sync(msg,cls){const e=document.getElementById('sync-status');e.textContent=msg;e.className='sync-status '+(cls||'');}

async function cargarDatos(){
  try{
    sync('Conectando','');
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const d=await r.json();
    if(d.record&&d.record.operas&&d.record.operas.length>0){
      operas=d.record.operas;
      sync('Sincronizado','ok');
    } else {
      operas=INICIALES;
      await guardarEnNube(true);
    }
  } catch(e){
    const local=localStorage.getItem('mis-operas-bk');
    operas=local?JSON.parse(local):INICIALES;
    sync('Sin conexión','err');
  }
  document.getElementById('sidebar-count').textContent=operas.length+' '+(operas.length===1?'ópera':'óperas');
  renderSidebar();
  if(operas.length>0) seleccionar(operas[0].id);
}

async function guardarEnNube(silencioso){
  try{
    if(!silencioso) sync('Guardando','');
    const r=await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({operas})});
    if(r.ok){
      localStorage.setItem('mis-operas-bk',JSON.stringify(operas));
      sync('Guardado','ok');
      cambiosPendientes=false;
      document.getElementById('save-bar').classList.remove('visible');
      setTimeout(()=>sync('Sincronizado','ok'),2000);
    } else throw new Error();
  } catch(e){
    localStorage.setItem('mis-operas-bk',JSON.stringify(operas));
    sync('Guardado local','err');
  }
}

function guardar(){guardarEnNube();}

function renderSidebar(){
  document.getElementById('sidebar-count').textContent=operas.length+' '+(operas.length===1?'ópera':'óperas');
  const lista=document.getElementById('lista-operas');
  lista.innerHTML=operas.map(o=>`
    <div class="opera-card ${operaActual&&operaActual.id===o.id?'active':''}" onclick="seleccionar(${o.id})">
      <div class="opera-card-num">Ficha ${o.num}</div>
      <div class="opera-card-title">${o.titulo}</div>
      <div class="opera-card-sub">${o.teatro} · ${o.fecha}</div>
      <div class="opera-card-rating">${'★'.repeat(o.valoracion)}${'☆'.repeat(5-o.valoracion)}</div>
    </div>`).join('');
}

function seleccionar(id){operaActual=operas.find(o=>o.id===id);renderSidebar();renderDetail();}

function renderDetail(){
  const o=operaActual;
  document.getElementById('detail-panel').innerHTML=`
    <div class="detail-header">
      <div class="ficha-num">Ficha ${o.num}</div>
      <div class="opera-title-big">${o.titulo}</div>
      <div class="opera-subtitle">${o.compositor} · ${o.idioma||''}</div>
      <div class="header-meta">
        <div style="font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.1em;color:var(--gris)">${o.teatro} · ${o.fecha}</div>
        <div class="rating-display">
          <div class="stars-input">${[1,2,3,4,5].map(i=>`<span class="star ${i<=o.valoracion?'filled':''}" onclick="setRating(${i})">★</span>`).join('')}</div>
          <div class="rating-label">Mi valoración</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Identificación de la obra</div>
      <div class="fields-grid triple">
        ${f('Compositor','compositor',o.compositor)}${f('Libretista','libretista',o.libretista)}${f('Idioma','idioma',o.idioma)}
        ${ff('Fuente literaria','fuente',o.fuente)}${f('Estreno mundial','estreno_mundial',o.estreno_mundial)}${f('Estreno en el Teatro Real','estreno_teatro',o.estreno_teatro)}
      </div>
    </div>

    <div class="section">
      <div class="section-title">La función</div>
      <div class="fields-grid triple">
        ${f('Fecha','fecha',o.fecha)}${f('Hora','hora',o.hora)}${f('Teatro','teatro',o.teatro)}
        ${f('Sala','sala',o.sala)}${f('Ciudad / País','ciudad',o.ciudad)}${f('Temporada','temporada',o.temporada)}
        ${f('Tipo de función','tipo_funcion',o.tipo_funcion)}${ff('Contexto especial','contexto',o.contexto)}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Dirección y equipo artístico</div>
      <div class="fields-grid">
        ${f('Director musical','dir_musical',o.dir_musical)}${f('Director de escena','dir_escena',o.dir_escena)}
        ${f('Escenógrafo','escenografo',o.escenografo)}${f('Figurinista','figurinista',o.figurinista)}
        ${f('Iluminación','iluminacion',o.iluminacion)}${f('Director del Coro','dir_coro',o.dir_coro)}
        ${ff('Orquesta','orquesta',o.orquesta)}${ff('Coro','coro',o.coro)}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Reparto</div>
      <table class="reparto-table">
        <thead><tr><th>Personaje</th><th>Cuerda</th><th>Intérprete</th></tr></thead>
        <tbody>${o.reparto.map(r=>`<tr><td class="personaje">${r.personaje}</td><td class="voz">${r.voz}</td><td class="cantante">${r.cantante}</td></tr>`).join('')}</tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">La producción</div>
      <div class="fields-grid">
        ${ff('Producción de origen','produccion_origen',o.produccion_origen)}${f('Tipo','tipo_produccion',o.tipo_produccion)}
        ${f('Ambientación','ambientacion',o.ambientacion)}${ft('Propuesta escénica','propuesta_escenica',o.propuesta_escenica)}
        ${ff('Elemento singular','elemento_singular',o.elemento_singular)}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Críticas y reseñas</div>
      <div class="links-list">
        ${o.criticas.map(c=>`<a class="link-item" href="${c.url}" target="_blank"><span class="link-medio">${c.medio}</span><span class="link-lang">${c.idioma}</span><span class="link-arrow">↗</span></a>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Enlaces oficiales</div>
      <div class="links-list">
        <a class="link-item" href="${o.url_teatro}" target="_blank"><span class="link-medio">Teatro — Página de la producción</span><span class="link-arrow">↗</span></a>
        <a class="link-item" href="${o.url_programa}" target="_blank"><span class="link-medio">Programa de mano (PDF)</span><span class="link-arrow">↗</span></a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Memorabilia · Entrada</div>
      <div class="ticket-grid">
        <div class="ticket-item"><div class="ticket-label">Localidad</div><div class="ticket-value">${o.ticket_localidad||'—'}</div></div>
        <div class="ticket-item"><div class="ticket-label">Fila y asientos</div><div class="ticket-value">${o.ticket_fila?o.ticket_fila+' · '+o.ticket_asientos:'—'}</div></div>
        <div class="ticket-item"><div class="ticket-label">Precio por entrada</div><div class="ticket-value price">${o.ticket_precio_unit||'—'}</div></div>
        <div class="ticket-item"><div class="ticket-label">Total pagado</div><div class="ticket-value price">${o.ticket_total||'—'}</div></div>
        <div class="ticket-item"><div class="ticket-label">Fuente de compra</div><div class="ticket-value">${o.ticket_fuente||'—'}</div></div>
        <div class="ticket-item"><div class="ticket-label">Tipo de entrada</div><div class="ticket-value">${o.ticket_tipo||'—'}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Mi experiencia</div>
      <div class="fields-grid">
        ${ft('Notas personales','notas',o.notas,'¿Qué te pareció la función?')}
        ${ft('Momentos destacados','momentos',o.momentos,'Momentos que no olvidarás...')}
        ${f('¿La volverías a ver?','volveria',o.volveria,'Sí / No / Con otro reparto...')}
        ${ft('Diario libre','diario',o.diario,'Lo que sentiste esa noche...')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Contexto histórico</div>
      <div class="fields-grid single">${ft('Contexto','contexto_historico',o.contexto_historico)}</div>
    </div>

    <div class="section">
      <div class="section-title">Vínculos con otras fichas</div>
      <div>${o.vinculos.map(v=>`<span class="vinculo-tag">${v}</span>`).join('')}</div>
    </div>
  `;
}

function f(l,k,v,p=''){return `<div class="field"><div class="field-label">${l}</div><input class="field-value" value="${esc(v)}" placeholder="${p||l}" onchange="actualizar('${k}',this.value)" oninput="marcarCambio()"></div>`;}
function ff(l,k,v,p=''){return `<div class="field field-full"><div class="field-label">${l}</div><input class="field-value" value="${esc(v)}" placeholder="${p||l}" onchange="actualizar('${k}',this.value)" oninput="marcarCambio()"></div>`;}
function ft(l,k,v,p=''){return `<div class="field field-full"><div class="field-label">${l}</div><textarea class="field-value" rows="3" placeholder="${p||l}" onchange="actualizar('${k}',this.value)" oninput="marcarCambio()">${v||''}</textarea></div>`;}
function esc(v){return(v||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function actualizar(k,v){if(!operaActual)return;operaActual[k]=v;const i=operas.findIndex(o=>o.id===operaActual.id);if(i!==-1)operas[i][k]=v;renderSidebar();}
function marcarCambio(){cambiosPendientes=true;document.getElementById('save-bar').classList.add('visible');}
function setRating(n){if(!operaActual)return;operaActual.valoracion=n;const i=operas.findIndex(o=>o.id===operaActual.id);if(i!==-1)operas[i].valoracion=n;document.querySelectorAll('.star').forEach((s,j)=>s.classList.toggle('filled',j<n));renderSidebar();marcarCambio();}

function nuevaOpera(){
  const id=Math.max(...operas.map(o=>o.id),0)+1;
  const num=String(id).padStart(3,'0');
  operas.push({id,num,titulo:"Nueva ópera",compositor:"",libretista:"",fuente:"",idioma:"",estreno_mundial:"",estreno_teatro:"",fecha:"",hora:"",teatro:"",sala:"",ciudad:"",temporada:"",tipo_funcion:"",contexto:"",dir_musical:"",dir_escena:"",escenografo:"",figurinista:"",iluminacion:"",dir_coro:"",orquesta:"",coro:"",reparto:[],produccion_origen:"",tipo_produccion:"",ambientacion:"",propuesta_escenica:"",elemento_singular:"",criticas:[],url_teatro:"",url_programa:"",ticket_localidad:"",ticket_fila:"",ticket_asientos:"",ticket_precio_unit:"",ticket_total:"",ticket_fuente:"",ticket_tipo:"",valoracion:0,notas:"",momentos:"",volveria:"",diario:"",contexto_historico:"",vinculos:[]});
  seleccionar(id);marcarCambio();
}

function exportarCSV(){
  const h=['Nº','Título','Compositor','Fecha','Teatro','Ciudad','Dir. Musical','Dir. Escena','Valoración','Total pagado'];
  const rows=operas.map(o=>[o.num,o.titulo,o.compositor,o.fecha,o.teatro,o.ciudad,o.dir_musical,o.dir_escena,o.valoracion,o.ticket_total]);
  const csv=[h,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='mis-operas.csv';a.click();
}

cargarDatos();
</script>
</body>
</html>
