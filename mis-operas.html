<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Óperas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--blanco:#ffffff;--crema:#f8f6f2;--gris-claro:#efefed;--gris:#888;--gris-oscuro:#444;--negro:#111;--linea:#e0ddd8;--borgona:#6b1f2a;--borgona-claro:#f5eaec;--dorado:#9a7d4a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--blanco);color:var(--negro);font-family:'EB Garamond',serif;min-height:100vh;font-size:16px;}

  header{background:var(--blanco);border-bottom:1px solid var(--negro);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;}
  .logo em{color:var(--borgona);font-style:italic;}
  .header-actions{display:flex;gap:0.7rem;align-items:center;}
  .sync-status{font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.15em;color:var(--gris);text-transform:uppercase;}
  .sync-status.ok{color:#5a8a5a;}.sync-status.err{color:var(--borgona);}
  .btn{font-family:'Montserrat',sans-serif;font-size:0.55rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;padding:0.38rem 0.9rem;border:1px solid var(--negro);background:transparent;color:var(--negro);cursor:pointer;transition:all 0.2s;}
  .btn:hover{background:var(--negro);color:var(--blanco);}
  .btn-primary{background:var(--borgona);border-color:var(--borgona);color:var(--blanco);}
  .btn-primary:hover{background:#8b2735;}
  .btn-privacy{background:var(--borgona-claro);border-color:var(--borgona);color:var(--borgona);}
  .btn-privacy:hover{background:var(--borgona);color:var(--blanco);}

  .container{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 58px);}

  /* SIDEBAR — grid 2 columns */
  .sidebar{border-right:1px solid var(--linea);background:var(--crema);overflow-y:auto;display:flex;flex-direction:column;}
  .sidebar-header{padding:1rem 1rem 0.8rem;border-bottom:1px solid var(--linea);flex-shrink:0;}
  .sidebar-label{font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gris);}
  .sidebar-count{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--negro);margin-top:0.1rem;}

  .opera-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--linea);flex:1;}
  .opera-card{background:var(--crema);padding:0.9rem 0.85rem;cursor:pointer;transition:background 0.15s;position:relative;border-bottom:none;}
  .opera-card:hover{background:var(--gris-claro);}
  .opera-card.active{background:var(--blanco);}
  .opera-card.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--borgona);}
  .opera-card-num{font-family:'Montserrat',sans-serif;font-size:0.46rem;letter-spacing:0.22em;color:var(--borgona);text-transform:uppercase;margin-bottom:0.25rem;}
  .opera-card-title{font-family:'Playfair Display',serif;font-size:0.9rem;font-style:italic;color:var(--negro);line-height:1.25;margin-bottom:0.2rem;}
  .opera-card-teatro{font-family:'Montserrat',sans-serif;font-size:0.48rem;color:var(--gris);margin-bottom:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .opera-card-fecha{font-family:'Montserrat',sans-serif;font-size:0.46rem;color:var(--gris);opacity:0.8;}
  .opera-card-rating{color:var(--dorado);font-size:0.6rem;margin-top:0.35rem;letter-spacing:0.05em;}
  .opera-card-tipo{display:inline-block;font-family:'Montserrat',sans-serif;font-size:0.4rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.1rem 0.4rem;border:0.5px solid var(--borgona);color:var(--borgona);background:var(--borgona-claro);margin-top:0.3rem;}

  .add-card{background:var(--crema);padding:0.9rem 0.85rem;cursor:pointer;transition:background 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px;color:var(--gris);font-family:'Montserrat',sans-serif;font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;border:none;width:100%;text-align:center;}
  .add-card:hover{background:var(--gris-claro);color:var(--borgona);}
  .add-icon{font-size:1.4rem;margin-bottom:0.3rem;opacity:0.4;}

  /* DETAIL */
  .detail{padding:2.5rem 3rem;overflow-y:auto;max-height:calc(100vh - 58px);background:var(--blanco);}
  .detail-header{padding-bottom:1.5rem;margin-bottom:1.8rem;border-bottom:2px solid var(--borgona);}
  .ficha-num{font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.3em;color:var(--borgona);text-transform:uppercase;margin-bottom:0.4rem;}
  .opera-title-big{font-family:'Playfair Display',serif;font-size:2.4rem;font-style:italic;font-weight:400;line-height:1.1;color:var(--negro);margin-bottom:0.3rem;}
  .opera-subtitle{font-family:'EB Garamond',serif;font-size:0.98rem;color:var(--gris);font-style:italic;margin-bottom:1.1rem;}
  .header-meta{display:flex;justify-content:space-between;align-items:flex-end;}
  .meta-left{font-family:'Montserrat',sans-serif;font-size:0.58rem;letter-spacing:0.08em;color:var(--gris);}
  .rating-display{text-align:right;}
  .stars-input{display:flex;gap:0.15rem;justify-content:flex-end;margin-bottom:0.15rem;}
  .star{font-size:0.95rem;cursor:pointer;color:var(--linea);transition:color 0.15s;}
  .star.filled{color:var(--dorado);}.star:hover{color:var(--dorado);}
  .rating-label{font-family:'Montserrat',sans-serif;font-size:0.46rem;letter-spacing:0.2em;color:var(--gris);text-transform:uppercase;}

  .section{margin-bottom:1.8rem;}
  .section-title{font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--borgona);margin-bottom:0.9rem;padding-bottom:0.35rem;border-bottom:0.5px solid var(--linea);}
  .fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--linea);border:0.5px solid var(--linea);}
  .fields-grid.triple{grid-template-columns:1fr 1fr 1fr;}
  .fields-grid.single{grid-template-columns:1fr;}
  .field{background:var(--blanco);padding:0.7rem 0.85rem;}
  .field:focus-within{background:#fdfcfa;}
  .field-full{grid-column:1/-1;}
  .field-label{font-family:'Montserrat',sans-serif;font-size:0.46rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gris);margin-bottom:0.2rem;}
  .field-value{font-family:'EB Garamond',serif;font-size:0.9rem;color:var(--negro);background:transparent;border:none;width:100%;outline:none;resize:none;line-height:1.5;}
  .field-value::placeholder{color:#ccc;font-style:italic;}

  .reparto-table{width:100%;border-collapse:collapse;}
  .reparto-table th{font-family:'Montserrat',sans-serif;font-size:0.46rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gris);text-align:left;padding:0.42rem 0.65rem;border-bottom:1px solid var(--negro);}
  .reparto-table td{padding:0.5rem 0.65rem;border-bottom:0.5px solid var(--linea);font-size:0.9rem;}
  .reparto-table tr:last-child td{border-bottom:none;}
  .personaje{color:var(--gris);font-style:italic;}.voz{font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.1em;color:var(--borgona);text-transform:uppercase;}.cantante{font-weight:500;}

  .links-list{display:flex;flex-direction:column;}
  .link-item{display:flex;align-items:center;gap:0.8rem;padding:0.55rem 0;border-bottom:0.5px solid var(--linea);text-decoration:none;transition:opacity 0.15s;}
  .link-item:hover{opacity:0.6;}
  .link-medio{font-family:'EB Garamond',serif;font-size:0.9rem;color:var(--negro);flex:1;}
  .link-lang{font-family:'Montserrat',sans-serif;font-size:0.46rem;letter-spacing:0.15em;color:var(--borgona);text-transform:uppercase;}
  .link-arrow{font-family:'Montserrat',sans-serif;font-size:0.62rem;color:var(--gris);}

  .ticket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--linea);border:0.5px solid var(--linea);}
  .ticket-item{background:var(--borgona-claro);padding:0.7rem 0.85rem;}
  .ticket-label{font-family:'Montserrat',sans-serif;font-size:0.46rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--borgona);margin-bottom:0.18rem;opacity:0.75;}
  .ticket-value{font-family:'EB Garamond',serif;font-size:0.9rem;color:var(--negro);}
  .ticket-value.price{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--borgona);}

  .vinculo-tag{display:inline-block;padding:0.18rem 0.6rem;border:0.5px solid var(--borgona);font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.07em;color:var(--borgona);margin:0.18rem;background:var(--borgona-claro);}

  .privacy-section.hidden .privacy-content{display:none;}
  .privacy-section.hidden .privacy-overlay{display:flex;}
  .privacy-overlay{display:none;align-items:center;justify-content:center;padding:1.2rem;background:var(--borgona-claro);border:0.5px solid var(--borgona);font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.15em;color:var(--borgona);text-transform:uppercase;cursor:pointer;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--gris);text-align:center;}
  .empty-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;color:var(--gris);}

  .save-bar{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--borgona);color:var(--blanco);padding:0.6rem 1.2rem;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;opacity:0;transition:opacity 0.3s;z-index:200;border:none;}
  .save-bar.visible{opacity:1;}

  ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--crema);}::-webkit-scrollbar-thumb{background:var(--linea);}

  @media(max-width:900px){
    .container{grid-template-columns:1fr;}
    .detail{padding:1.5rem;}
    .fields-grid,.fields-grid.triple{grid-template-columns:1fr;}
    .ticket-grid{grid-template-columns:1fr 1fr;}
    .opera-title-big{font-size:1.8rem;}
    header{padding:0 1rem;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">Mis <em>Óperas</em></div>
  <div class="header-actions">
    <span class="sync-status" id="sync-status">Conectando</span>
    <button class="btn btn-privacy" id="privacy-btn" onclick="togglePrivacy()">🔓 Privado</button>
    <button class="btn" onclick="exportarCSV()">CSV</button>
    <button class="btn btn-primary" onclick="nuevaOpera()">+ Nueva</button>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">Mi colección</div>
      <div class="sidebar-count" id="sidebar-count">—</div>
    </div>
    <div class="opera-grid" id="opera-grid"></div>
  </div>
  <div class="detail" id="detail-panel">
    <div class="empty-state"><div class="empty-text">Cargando...</div></div>
  </div>
</div>
<button class="save-bar" id="save-bar" onclick="guardar()">Guardar en la nube</button>

function sync(msg,cls){const e=document.getElementById('sync-status');e.textContent=msg;e.className='sync-status '+(cls||'');}

function togglePrivacy(){
  privado=!privado;
  document.getElementById('privacy-btn').textContent=privado?'🔒 Privado':'🔓 Privado';
  document.querySelectorAll('.privacy-section').forEach(s=>s.classList.toggle('hidden',privado));
}

async function cargarDatos(){
  try{
    sync('Conectando','');
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const d=await r.json();
    const remoto=d.record&&d.record.operas;
    if(remoto&&remoto.length>=8){operas=remoto;sync('Sincronizado','ok');}
    else{operas=INICIALES;await guardarEnNube(true);}
  } catch(e){
    const local=localStorage.getItem('mis-operas-bk');
    operas=local?JSON.parse(local):INICIALES;
    sync('Sin conexión','err');
  }
  renderGrid();
  if(operas.length>0) seleccionar(operas[0].id);
}

async function guardarEnNube(silencioso){
  try{
    if(!silencioso) sync('Guardando','');
    const r=await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({operas})});
    if(r.ok){localStorage.setItem('mis-operas-bk',JSON.stringify(operas));sync('Guardado','ok');cambiosPendientes=false;document.getElementById('save-bar').classList.remove('visible');setTimeout(()=>sync('Sincronizado','ok'),2000);}
    else throw new Error();
  } catch(e){localStorage.setItem('mis-operas-bk',JSON.stringify(operas));sync('Guardado local','err');}
}
function guardar(){guardarEnNube();}

function renderGrid(){
  document.getElementById('sidebar-count').textContent=operas.length+' '+(operas.length===1?'ópera':'óperas');
  const grid=document.getElementById('opera-grid');
  grid.innerHTML=operas.map(o=>`
    <div class="opera-card ${operaActual&&operaActual.id===o.id?'active':''}" onclick="seleccionar(${o.id})">
      <div class="opera-card-num">Ficha ${o.num}</div>
      <div class="opera-card-title">${o.titulo}</div>
      <div class="opera-card-teatro">${o.teatro}</div>
      <div class="opera-card-fecha">${o.fecha}</div>
      <div class="opera-card-rating">${'★'.repeat(o.valoracion)}${'☆'.repeat(5-o.valoracion)}</div>
      ${o.tipo==='concierto'?'<span class="opera-card-tipo">Concierto</span>':''}
    </div>`).join('')+`<div class="add-card" onclick="nuevaOpera()"><div class="add-icon">+</div>Añadir ópera</div>`;
}

function seleccionar(id){operaActual=operas.find(o=>o.id===id);renderGrid();renderDetail();}

        ${ft('Momentos destacados','momentos',o.momentos,'Momentos que no olvidarás...')}
        ${f('¿La volverías a ver?','volveria',o.volveria,'Sí / No / Con otro reparto...')}
        ${ft('Diario libre','diario',o.diario,'Lo que sentiste esa noche...')}
      </div></div>
    <div class="section"><div class="section-title">Contexto histórico</div>
      <div class="fields-grid single">${ft('Contexto','contexto_historico',o.contexto_historico)}</div></div>
    <div class="section"><div class="section-title">Vínculos con otras fichas</div>
      <div>${o.vinculos.map(v=>`<span class="vinculo-tag">${v}</span>`).join('')}</div></div>
  `;
}

function f(l,k,v,p=''){return `<div class="field"><div class="field-label">${l}</div><input class="field-value" value="${esc(v)}" placeholder="${p||l}" onchange="actualizar('${k}',this.value)" oninput="marcarCambio()"></div>`;}
function ff(l,k,v,p=''){return `<div class="field field-full"><div class="field-label">${l}</div><input class="field-value" value="${esc(v)}" placeholder="${p||l}" onchange="actualizar('${k}',this.value)" oninput="marcarCambio()"></div>`;}
function ft(l,k,v,p=''){return `<div class="field field-full"><div class="field-label">${l}</div><textarea class="field-value" rows="3" placeholder="${p||l}" onchange="actualizar('${k}',this.value)" oninput="marcarCambio()">${v||''}</textarea></div>`;}
function esc(v){return(v||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function actualizar(k,v){if(!operaActual)return;operaActual[k]=v;const i=operas.findIndex(o=>o.id===operaActual.id);if(i!==-1)operas[i][k]=v;renderGrid();}
function marcarCambio(){cambiosPendientes=true;document.getElementById('save-bar').classList.add('visible');}
function setRating(n){if(!operaActual)return;operaActual.valoracion=n;const i=operas.findIndex(o=>o.id===operaActual.id);if(i!==-1)operas[i].valoracion=n;document.querySelectorAll('.star').forEach((s,j)=>s.classList.toggle('filled',j<n));renderGrid();marcarCambio();}

function nuevaOpera(){
  const id=Math.max(...operas.map(o=>o.id),0)+1;
  const num=String(id).padStart(3,'0');
  operas.push({id,num,tipo:"escénica",titulo:"Nueva ópera",compositor:"",libretista:"",fuente:"",idioma:"",estreno_mundial:"",estreno_teatro:"",fecha:"",hora:"",teatro:"",sala:"",ciudad:"",temporada:"",tipo_funcion:"",contexto:"",dir_musical:"",dir_escena:"",escenografo:"",figurinista:"",iluminacion:"",dir_coro:"",orquesta:"",coro:"",reparto:[],produccion_origen:"",tipo_produccion:"",ambientacion:"",propuesta_escenica:"",elemento_singular:"",criticas:[],url_teatro:"",url_programa:"",ticket_localidad:"",ticket_fila:"",ticket_asientos:"",ticket_precio_unit:"",ticket_total:"",ticket_fuente:"",ticket_tipo:"",valoracion:0,notas:"",momentos:"",volveria:"",diario:"",contexto_historico:"",vinculos:[]});
  seleccionar(id);marcarCambio();
}

function exportarCSV(){
  const h=['Nº','Título','Compositor','Tipo','Fecha','Teatro','Ciudad','Dir. Musical','Valoración','Total pagado'];
  const rows=operas.map(o=>[o.num,o.titulo,o.compositor,o.tipo,o.fecha,o.teatro,o.ciudad,o.dir_musical,o.valoracion,o.ticket_total]);
  const csv=[h,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='mis-operas.csv';a.click();
}

cargarDatos();
</script>
